[package]
name = "nwidgets"
version = "0.1.0"
edition = "2021"
authors = ["Niahex"]
license = "GPL-3.0"
description = "High-performance Wayland widget system built with GPUI"
repository = "https://github.com/Niahex/nwidgets"
publish = false
include = ["src/**/*", "Cargo.toml", "assets/**/*"]

[dependencies]
gpui = { git = "https://github.com/Niahex/zed", branch = "layershell", features = ["wayland"] }
gpui_tokio = { git = "https://github.com/Niahex/zed", branch = "layershell" }
gpui_platform = { git = "https://github.com/Niahex/zed", branch = "layershell", features = ["wayland"] }
naga = { version = "28.0", features = ["wgsl-in", "termcolor"] }

anyhow = "1.0"
log = "0.4"
env_logger = "0.11"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs", "io-util", "process", "net"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
futures-util = "0.3"
parking_lot = "0.12"
chrono = "0.4"
zbus = { version = "5.12.0", default-features = false, features = ["async-io"] }
system-tray = "0.8.5"
pipewire = "0.9.2"
image = "0.25"
smallvec = "1"
cef = { git = "https://github.com/tauri-apps/cef-rs", tag = "export-cef-dir-v144.4.0+144.0.13" }
cef-dll-sys = { git = "https://github.com/tauri-apps/cef-rs", tag = "export-cef-dir-v144.4.0+144.0.13" }
dirs = "6.0"

# Launcher dependencies
freedesktop-desktop-entry = "0.5.0"
freedesktop-icons = "0.4.0"
nucleo = "0.3.0"
numbat = "1.10.0"
libc = "0.2"
secret-service = { version = "5.1.0", features = ["rt-async-io-crypto-rust"] }
gio = "0.20"
lyon_tessellation = "1.0.16"
base64 = "0.22.1"

[dev-dependencies]
divan = "0.1"

[[bench]]
name = "benchmarks"
harness = false

[workspace]

[profile.dev]
split-debuginfo = "unpacked"
incremental = false
codegen-units = 16

[profile.dev.build-override]
codegen-units = 16

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
incremental = false

[profile.release.package."*"]
opt-level = 3
codegen-units = 16

[patch.crates-io]
wgpu = { git = "https://github.com/zed-industries/wgpu", rev = "465557eccfe77c840a9b4936f1408da9503372c4" }
wgpu-core = { git = "https://github.com/zed-industries/wgpu", rev = "465557eccfe77c840a9b4936f1408da9503372c4" }
wgpu-hal = { git = "https://github.com/zed-industries/wgpu", rev = "465557eccfe77c840a9b4936f1408da9503372c4" }
wgpu-types = { git = "https://github.com/zed-industries/wgpu", rev = "465557eccfe77c840a9b4936f1408da9503372c4" }
naga = { git = "https://github.com/zed-industries/wgpu", rev = "465557eccfe77c840a9b4936f1408da9503372c4" }
codespan-reporting = { git = "https://github.com/brendanzab/codespan", rev = "a77bee56838f4e9479b9400243d0e8e9cfb620ea" }
